name: Bug report
description: Report a reproducible defect in the open-source documentation app or public registry.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Do not disclose security vulnerabilities here; use SECURITY.md instead."
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps, repository, or component configuration.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version and environment
      placeholder: Node, pnpm, browser, OS, and package version
    validations:
      required: true
